<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./src/assets/images/favicon-32x32.png">

  <title>Frontend Mentor | Blog preview card</title>

  <link rel="stylesheet" href="./src/css/reset.css">
  <link rel="stylesheet" href="./src/css/variables.css">
  <link rel="stylesheet" href="./src/css/style.css">
  <link rel="stylesheet" href="./src/css/responsive.css">
</head>
<body>
  <main>
    <article class="course-card">
      <img src="./src/assets/images/illustration-article.svg"
        alt="Abstract illustration with black geometric shapes on a yellow background" class="course-card__image">

      <div class="course-card-info">
        <span>Learning</span>
        <p class="course-card-publication-date"><time datetime="2023-12-21">Published 21 Dec 2023</time></p>
        <h1 class="course-card-title"><a href="/">HTML & CSS foundations</a></h1>
        <p class="course-card-description">These languages are the backbone of every website, defining structure,
          content, and presentation.</p>
      </div>

      <div class="course-card-author">
        <img src="./src/assets/images/image-avatar.webp" alt="User profile picture">
        <span>Greg Hooper</span>
      </div>

    </article>
  </main>
</body>
</html>
